[package]
name = "ruvector-gnn"
version = "2.2.3"
edition = "2021"
rust-version = "1.77"
license = "MIT"
authors = ["Ruvector Team"]
repository = "https://github.com/ruvnet/ruvector"
readme = "README.md"
description = "Graph Neural Network layer for Ruvector on HNSW topology"

[dependencies]
# Core
ruvector-core = { path = "../core-rs", default-features = false }

# Math and numerics
ndarray = { version = "0.16", features = ["serde"] }
rand = "0.8"
rand_distr = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Performance
rayon = "1.10"
parking_lot = "0.12"
dashmap = "6"

# Memory mapping (non-WASM only)
memmap2 = { version = "0.9", optional = true }
page_size = { version = "0.6", optional = true }

# Platform-specific dependencies
[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

# Optional dependencies
napi = { version = "2.16", optional = true }
napi-derive = { version = "2.16", optional = true }

[features]
default = ["simd", "mmap"]
simd = []
wasm = []
napi = ["dep:napi", "dep:napi-derive"]
mmap = ["dep:memmap2", "dep:page_size"]
cold-tier = ["mmap"]  # Hyperbatch training for graphs exceeding RAM

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.5"
tempfile = "3.10"

[lib]
crate-type = ["rlib"]
