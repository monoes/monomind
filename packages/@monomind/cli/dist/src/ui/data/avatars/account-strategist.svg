    <ellipse cx="60" cy="52" rx="2.5" ry="1.8" fill="#F5C18E" opacity="0.7" stroke="#F5C18E" stroke-width="0.5"/>
    <path d="M53,61 Q60,65 67,61" stroke="#C4726A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    
