  <circle cx="60" cy="60" r="58" fill="none" stroke="#6D28D9" stroke-width="3"/>

  <g clip-path="url(#circ)">
    
  <!-- body -->
  <ellipse cx="60" cy="112" rx="26" ry="36" fill="#6D28D9"/>
  <ellipse cx="60" cy="110" rx="22" ry="32" fill="#5014B8"/>
