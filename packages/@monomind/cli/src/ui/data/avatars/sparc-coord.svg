  <circle cx="38" cy="46" r="5" fill="#6B3F2A"/>
  <circle cx="38" cy="46" r="3" fill="#6B3F2A" opacity="0.5"/>
  <circle cx="82" cy="46" r="5" fill="#6B3F2A"/>
