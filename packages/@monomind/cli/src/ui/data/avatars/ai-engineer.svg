  <circle cx="60" cy="60" r="58" fill="none" stroke="#5B5BCC" stroke-width="3"/>

  <g clip-path="url(#circ)">
    
  <!-- body -->
  <ellipse cx="60" cy="112" rx="26" ry="36" fill="#5B5BCC"/>
  <ellipse cx="60" cy="110" rx="22" ry="32" fill="#3A3AAA"/>
