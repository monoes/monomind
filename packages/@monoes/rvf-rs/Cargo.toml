[package]
name = "monovector-rvf"
version = "0.1.0"
edition = "2021"
description = "RuVector Format Node.js N-API bindings for native vector operations"
license = "MIT"
repository = "https://github.com/monoes/monomind"
homepage = "https://github.com/monoes/monomind"
readme = "README.md"
categories = ["api-bindings", "database-implementations"]
keywords = ["vector", "nodejs", "napi", "binding", "rvf"]
rust-version = "1.87"

[lib]
crate-type = ["cdylib"]

[dependencies]
rvf-runtime = { version = "0.2.0", path = "../rvf-runtime-lib" }
rvf-types = { version = "0.2.0", path = "../rvf-types-lib" }
napi = { version = "2", features = ["async"] }
napi-derive = "2"
serde_json = "1"

[build-dependencies]
napi-build = "2"
