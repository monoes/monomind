[package]
name = "ruvector-attention"
version = "2.2.3"
edition = "2021"
authors = ["Ruvector Team"]
license = "MIT"
repository = "https://github.com/ruvnet/ruvector"
description = "Attention mechanisms for ruvector - geometric, graph, and sparse attention"
keywords = ["attention", "machine-learning", "vector-search", "graph-attention"]
categories = ["algorithms", "science"]

[lib]
crate-type = ["rlib"]

[features]
default = ["simd"]
simd = []
wasm = []
napi = ["dep:napi-derive", "dep:napi"]
# Enable advanced math-based attention mechanisms (dep not available locally)
# math = ["dep:ruvector-math"]
# Enable sheaf attention (Coherence-Gated Transformer per ADR-015)
sheaf = []

[dependencies]
thiserror = "1.0"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
rand = "0.8"
napi = { version = "2", optional = true }
napi-derive = { version = "2", optional = true }

# Advanced math primitives for OT, mixed-curvature, and topology-gated attention
# ruvector-math = { version = "2.0", path = "../ruvector-math", optional = true }  # not available locally

[dev-dependencies]
criterion = "0.5"
approx = "0.5"
rand = "0.8"

[[bench]]
name = "attention_bench"
harness = false

[[bench]]
name = "attention_benchmarks"
harness = false

[[bin]]
name = "bench_runner"
path = "benches/attention_benchmarks.rs"

[lints.rust]
unexpected_cfgs = { level = "allow", priority = -1 }
unused_imports = "allow"
dead_code = "allow"
unused_variables = "allow"

[lints.clippy]
pedantic = { level = "allow", priority = -2 }
all = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = 0 }
suspicious = { level = "deny", priority = 0 }
needless_range_loop = "allow"
manual_div_ceil = "allow"
manual_is_multiple_of = "allow"
manual_range_contains = "allow"
redundant_field_names = "allow"
len_zero = "allow"
get_first = "allow"
useless_vec = "allow"
manual_clamp = "allow"
assertions_on_constants = "allow"
approx_constant = "allow"
too_many_arguments = "allow"
needless_borrow = "allow"
needless_borrows_for_generic_args = "allow"
needless_update = "allow"
explicit_auto_deref = "allow"
