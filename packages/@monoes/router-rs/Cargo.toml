[package]
name = "monovector-router"
version = "2.2.3"
edition = "2021"
authors = ["Ruvector Team"]
license = "MIT"
repository = "https://github.com/ruvnet/ruvector"
readme = "README.md"
description = "NAPI-RS bindings for ruvector-router-core vector database"

[lib]
crate-type = ["cdylib"]

[dependencies]
ruvector-router-core = { version = "2.0", path = "../ruvector-router-core-lib" }

# NAPI-RS dependencies
napi = { version = "2.16", default-features = false, features = ["napi9", "async", "tokio_rt"] }
napi-derive = "2.16"

# Workspace dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tokio = { version = "1.41", features = ["rt-multi-thread", "sync", "macros"] }

# Additional dependencies
chrono = "0.4"

[build-dependencies]
napi-build = "2.1"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = true
