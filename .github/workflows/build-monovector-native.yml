name: Build MonoVector Native Packages

on:
  push:
    paths:
      - 'packages/@monoes/**-rs/**'
      - 'packages/@monoes/**-lib/**'
      - '.github/workflows/build-monovector-native.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64-gnu
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win32-x64-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cross-compile tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build sona
        run: |
          cd packages/@monoes/sona
          napi build --platform --release --features napi --target ${{ matrix.target }} \
            --manifest-path ../sona-rs/Cargo.toml --output-dir .

      - name: Build router
        run: |
          cd packages/@monoes/router
          napi build --platform --release --target ${{ matrix.target }} \
            --manifest-path ../router-rs/Cargo.toml --output-dir .

      - name: Build attention
        run: |
          cd packages/@monoes/attention
          napi build --platform --release --target ${{ matrix.target }} \
            --manifest-path ../attention-rs/Cargo.toml --output-dir .

      - name: Build gnn
        run: |
          cd packages/@monoes/gnn
          napi build --platform --release --target ${{ matrix.target }} \
            --manifest-path ../gnn-rs/Cargo.toml --output-dir .

      - name: Build rvf
        run: |
          cd packages/@monoes/rvf
          napi build --platform --release --target ${{ matrix.target }} \
            --manifest-path ../rvf-rs/Cargo.toml --output-dir .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monovector-native-${{ matrix.suffix }}
          path: |
            packages/@monoes/sona/*.node
            packages/@monoes/router/*.node
            packages/@monoes/attention/*.node
            packages/@monoes/gnn/*.node
            packages/@monoes/rvf/*.node
