<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MASTERMIND — Autonomous Business Brain</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #07071a;
  color: #e0e0ff;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ─── Starfield ─── */
#stars {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, #12123a 0%, #07071a 70%);
  overflow: hidden;
  z-index: 0;
}
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
  animation-delay: var(--delay);
}
@keyframes twinkle { from { opacity: .1; } to { opacity: .9; } }

/* ─── Main stage ─── */
#stage {
  position: relative; width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
}

/* ─── Title ─── */
#title {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 60; pointer-events: none;
}
#title h1 {
  font-size: 26px; font-weight: 900; letter-spacing: 10px;
  background: linear-gradient(135deg, #c080ff 0%, #7040ff 50%, #ff60ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#title p { font-size: 10px; color: #5555aa; letter-spacing: 4px; margin-top: 3px; }

/* ─── Round table ─── */
#table {
  position: absolute;
  width: 660px; height: 660px; border-radius: 50%;
  background:
    radial-gradient(circle at 38% 32%, rgba(100,60,180,.35) 0%, rgba(25,15,60,.55) 55%, rgba(8,5,22,.85) 100%);
  border: 2px solid rgba(130,80,255,.28);
  box-shadow:
    0 0 80px rgba(90,40,220,.18),
    inset 0 0 80px rgba(40,15,90,.35);
}

/* ─── SVG connections ─── */
#svg-layer {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
  overflow: visible;
}
.conn-line {
  fill: none; stroke-width: 1.5;
  stroke-dasharray: 7 14;
  opacity: .35;
  animation: dash-flow 2.8s linear infinite;
}
@keyframes dash-flow { from { stroke-dashoffset: 84; } to { stroke-dashoffset: 0; } }

/* ─── Mastermind center ─── */
#mm-center {
  position: absolute; z-index: 20;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
#mm-brain {
  font-size: 76px; line-height: 1;
  filter: drop-shadow(0 0 22px rgba(160,100,255,.95));
  animation: brain-pulse 2.4s ease-in-out infinite;
  cursor: default;
}
@keyframes brain-pulse {
  0%,100% { transform: scale(1);   filter: drop-shadow(0 0 22px rgba(160,100,255,.95)); }
  50%      { transform: scale(1.07); filter: drop-shadow(0 0 40px rgba(200,140,255,1)); }
}
#mm-label {
  font-size: 15px; font-weight: 900; letter-spacing: 4px;
  color: #c0a0ff; text-shadow: 0 0 18px rgba(160,100,255,.8);
}
#mm-sub { font-size: 9px; color: #7070a0; letter-spacing: 2px; }

#monograph-btn {
  display: flex; align-items: center; gap: 5px;
  background: rgba(70,40,140,.65);
  border: 1px solid rgba(150,100,255,.65);
  color: #c0a0ff; padding: 5px 14px;
  border-radius: 20px; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all .22s; letter-spacing: .5px;
}
#monograph-btn:hover {
  background: rgba(120,70,210,.85);
  border-color: rgba(210,160,255,.9);
  box-shadow: 0 0 18px rgba(150,100,255,.55);
  transform: scale(1.07);
}

#iterate-badge {
  background: rgba(30,120,70,.4);
  border: 1px solid rgba(60,200,110,.55);
  color: #70ffaa; padding: 3px 12px;
  border-radius: 12px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
}

/* ─── Domain nodes ─── */
.domain-node {
  position: absolute; width: 148px;
  background: rgba(14,10,32,.92);
  border: 1.5px solid rgba(150,100,255,.22);
  border-radius: 18px; padding: 13px 10px 11px;
  cursor: pointer;
  transition: transform .32s cubic-bezier(.34,1.56,.64,1), box-shadow .22s, border-color .22s;
  transform: translate(-50%, -50%);
  z-index: 5; text-align: center;
  backdrop-filter: blur(6px);
}
.domain-node:hover, .domain-node.active {
  transform: translate(-50%, -50%) scale(1.14);
  border-color: var(--clr);
  box-shadow: 0 0 30px var(--glow), inset 0 0 18px rgba(0,0,0,.3);
  z-index: 25;
}
.dn-emoji  { font-size: 34px; display: block; margin-bottom: 3px; }
.dn-name   { font-size: 12px; font-weight: 800; color: var(--clr); letter-spacing: 1.5px; display: block; }
.dn-mgr    { font-size: 9px; color: #777; margin-top: 3px; display: block; line-height: 1.5; }
.swarm-tag {
  display: inline-block; margin-top: 6px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 8px; padding: 2px 7px;
  font-size: 8px; color: #999; letter-spacing: .3px;
}
.agents-row {
  display: flex; flex-wrap: wrap; gap: 3px;
  justify-content: center; margin-top: 8px;
  max-height: 0; overflow: hidden;
  transition: max-height .38s ease, padding .38s;
}
.domain-node:hover .agents-row,
.domain-node.active .agents-row { max-height: 140px; padding-bottom: 2px; }
.agent-chip {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.13);
  border-radius: 7px; padding: 2px 6px;
  font-size: 8px; color: #bbb; white-space: nowrap;
}

/* ─── Detail panel ─── */
#detail-panel {
  position: fixed; right: 22px; top: 50%;
  transform: translateY(-50%);
  width: 270px;
  background: rgba(12,8,30,.96);
  border: 1px solid rgba(140,90,255,.4);
  border-radius: 18px; padding: 22px;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity .28s, transform .28s;
  backdrop-filter: blur(14px);
  transform: translateY(-50%) translateX(20px);
  box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 0 30px rgba(100,50,255,.15);
}
#detail-panel.visible {
  opacity: 1; pointer-events: all;
  transform: translateY(-50%) translateX(0);
}
#close-panel {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none;
  color: #666; font-size: 16px; cursor: pointer;
  transition: color .15s;
}
#close-panel:hover { color: #ccc; }

/* ─── Mode pill ─── */
.mode-pill {
  display: inline-block;
  padding: 2px 10px; border-radius: 10px;
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
}
.mode-auto    { background: rgba(50,200,100,.2); border: 1px solid rgba(50,200,100,.5); color: #60ef90; }
.mode-confirm { background: rgba(220,150,30,.2);  border: 1px solid rgba(220,150,30,.5);  color: #ffc040; }

/* ─── Legend ─── */
#legend {
  position: fixed; bottom: 16px; left: 18px;
  font-size: 9px; color: #444; z-index: 50;
  line-height: 2; pointer-events: none;
}

/* ─── Scrollbar (panel) ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(150,100,255,.3); border-radius: 4px; }
</style>
</head>
<body>

<div id="stars"></div>

<div id="title">
  <h1>MASTERMIND</h1>
  <p>AUTONOMOUS BUSINESS BRAIN &nbsp;·&nbsp; 10 DOMAINS &nbsp;·&nbsp; SELF-IMPROVING</p>
</div>

<div id="stage">
  <svg id="svg-layer"></svg>
  <div id="table"></div>

  <!-- Mastermind center node -->
  <div id="mm-center">
    <div id="mm-brain">🧠</div>
    <div id="mm-label">MASTERMIND</div>
    <div id="mm-sub">TOP-LEVEL ORCHESTRATOR</div>
    <button id="monograph-btn" onclick="showMonograph()">📊 &nbsp;Monograph</button>
    <div id="iterate-badge">⚡ &nbsp;--iterate N</div>
  </div>

  <div id="nodes"></div>
</div>

<!-- Detail / Monograph panel -->
<div id="detail-panel">
  <button id="close-panel" onclick="closePanel()">✕</button>
  <div id="detail-content"></div>
</div>

<div id="legend">
  🐒 hover a domain to see sub-agents &nbsp;·&nbsp; click for details &nbsp;·&nbsp; 📊 for brain/memory info
</div>

<script>
/* ── Domain data ── */
const DOMAINS = [
  {
    name:'Build',    emoji:'🔨',
    manager:'coordinator', mode:'auto',
    swarm:'hierarchical · 6 agents · raft',
    color:'#4FC3F7', board:'development',
    agents:['backend-dev','frontend-dev','tester','reviewer','sparc-coder'],
    desc:'Ship features, fix bugs, refactor code. Development Manager decomposes goals into monotask briefings and coordinates a hierarchical raft swarm.'
  },
  {
    name:'Idea',     emoji:'💡',
    manager:'coordinator', mode:'confirm',
    swarm:'mesh · 6 agents · gossip',
    color:'#FFD54F', board:'ideation',
    agents:['researcher','Trend Researcher','UX Researcher','Growth Hacker','Content Creator'],
    desc:'Brainstorm products, features, pivots. A mesh of specialists explore multiple angles simultaneously, cross-pollinating insights via gossip protocol.'
  },
  {
    name:'Marketing',emoji:'📣',
    manager:'coordinator', mode:'confirm',
    swarm:'star · 5 agents · parallel',
    color:'#FF8A65', board:'marketing',
    agents:['Content Creator','SEO Specialist','Social Media Strategist','Analytics Reporter','Ad Creative Strategist'],
    desc:'Campaigns, copy, SEO, social media. Star topology runs all channel workstreams in parallel, then the hub synthesises outputs.'
  },
  {
    name:'Review',   emoji:'🔍',
    manager:'reviewer', mode:'auto',
    swarm:'mesh · 4 agents · gossip',
    color:'#CE93D8', board:'review',
    agents:['Code Reviewer','Security Engineer','Software Architect','Accessibility Auditor'],
    desc:'Code, content, security, strategy review. Specialist reviewers share findings via gossip mesh for multi-angle assessment.'
  },
  {
    name:'Research', emoji:'🔬',
    manager:'researcher', mode:'auto',
    swarm:'mesh · 4 agents · gossip',
    color:'#80DEEA', board:'research',
    agents:['researcher','Trend Researcher','UX Researcher','Analytics Reporter'],
    desc:'Market, competitor, user research. Intelligence streams cross-pollinate via mesh to build a comprehensive picture.'
  },
  {
    name:'Content',  emoji:'✍️',
    manager:'coordinator', mode:'confirm',
    swarm:'ring · 4 agents · pipeline',
    color:'#A5D6A7', board:'content',
    agents:['researcher','Content Creator','Technical Writer','editor'],
    desc:'Blog, docs, newsletters. Ring pipeline: research → draft → edit → format/publish. Each stage feeds the next.'
  },
  {
    name:'Release',  emoji:'🚀',
    manager:'coordinator', mode:'auto',
    swarm:'hierarchical · 5 agents · raft',
    color:'#EF9A9A', board:'release',
    agents:['release-manager','tester','DevOps Automator','cicd-engineer'],
    desc:'Version, changelog, deploy. Hierarchical raft keeps authoritative release state across environments with rollback plan.'
  },
  {
    name:'Sales',    emoji:'💼',
    manager:'coordinator', mode:'confirm',
    swarm:'hierarchical · 4 agents · raft',
    color:'#FFCC80', board:'sales',
    agents:['Outbound Strategist','Proposal Strategist','Deal Strategist','Account Strategist'],
    desc:'Outreach, proposals, pipeline. Coordinated sales motions from ICP definition through to proposal and deal close.'
  },
  {
    name:'Ops',      emoji:'⚙️',
    manager:'coordinator', mode:'auto',
    swarm:'star · 4 agents · parallel',
    color:'#90CAF9', board:'ops',
    agents:['Workflow Optimizer','Analytics Reporter','DevOps Automator','cicd-engineer'],
    desc:'Workflow automation, reporting, process optimisation. Star hub aggregates independent workstream outputs.'
  },
  {
    name:'Finance',  emoji:'💰',
    manager:'coordinator', mode:'confirm',
    swarm:'hierarchical · 3 agents · raft',
    color:'#C8E6C9', board:'finance',
    agents:['Finance Tracker','Analytics Reporter'],
    desc:'Invoicing, budget, forecasting. Small precise team with raft authority for numerical accuracy and auditability.'
  },
];

let activeIdx = null;

/* ── Stars ── */
(function makeStars() {
  const el = document.getElementById('stars');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.4 + .4;
    s.style.cssText =
      `width:${sz}px;height:${sz}px;`+
      `left:${Math.random()*100}%;top:${Math.random()*100}%;`+
      `--dur:${(Math.random()*4+2).toFixed(1)}s;`+
      `--delay:${(Math.random()*3).toFixed(1)}s;`+
      `opacity:${(Math.random()*.6+.1).toFixed(2)};`;
    el.appendChild(s);
  }
})();

/* ── Build nodes + SVG lines ── */
function build() {
  const svg   = document.getElementById('svg-layer');
  const nodes = document.getElementById('nodes');
  svg.innerHTML = ''; nodes.innerHTML = '';

  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const r  = Math.min(window.innerWidth, window.innerHeight) * 0.315;
  const n  = DOMAINS.length;

  DOMAINS.forEach((d, i) => {
    const ang = (i / n) * 2 * Math.PI - Math.PI / 2;
    const x = cx + r * Math.cos(ang);
    const y = cy + r * Math.sin(ang);

    /* SVG line */
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', x);  line.setAttribute('y2', y);
    line.setAttribute('stroke', d.color);
    line.classList.add('conn-line');
    line.style.animationDelay = `${i * 0.28}s`;
    svg.appendChild(line);

    /* Domain node */
    const nd = document.createElement('div');
    nd.className = 'domain-node';
    nd.id = `dn-${i}`;
    nd.style.cssText =
      `left:${x}px;top:${y}px;`+
      `--clr:${d.color};--glow:${d.color}44;`+
      `border-color:${d.color}33;`;
    nd.innerHTML = `
      <span class="dn-emoji">${d.emoji}</span>
      <span class="dn-name">${d.name}</span>
      <span class="dn-mgr">🐒 ${d.manager}
        <span class="mode-pill mode-${d.mode}">${d.mode}</span>
      </span>
      <span class="swarm-tag">${d.swarm}</span>
      <div class="agents-row">${d.agents.map(a=>`<span class="agent-chip">🐒 ${a}</span>`).join('')}</div>
    `;
    nd.addEventListener('click', ()=> showDomain(i));
    nodes.appendChild(nd);
  });
}

build();
window.addEventListener('resize', build);

/* ── Show domain detail ── */
function showDomain(i) {
  const d = DOMAINS[i];
  if (activeIdx === i) { closePanel(); return; }

  if (activeIdx !== null && activeIdx !== 'mono') {
    document.getElementById(`dn-${activeIdx}`)?.classList.remove('active');
  }
  activeIdx = i;
  document.getElementById(`dn-${i}`).classList.add('active');

  document.getElementById('detail-content').innerHTML = `
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:42px;line-height:1">${d.emoji}</div>
      <div style="font-size:17px;font-weight:900;color:${d.color};letter-spacing:2px;margin-top:6px;">
        mastermind:${d.name.toLowerCase()}
      </div>
      <div style="margin-top:5px;">
        <span class="mode-pill mode-${d.mode}">default: ${d.mode}</span>
      </div>
    </div>

    <p style="font-size:11px;color:#aaa;line-height:1.75;margin-bottom:14px;">${d.desc}</p>

    <div style="font-size:9px;color:#666;letter-spacing:1.5px;margin-bottom:5px;">SWARM CONFIG</div>
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
        border-radius:9px;padding:9px 12px;font-size:11px;color:#ccc;margin-bottom:14px;
        font-family:monospace;letter-spacing:.5px;">
      ${d.swarm}
    </div>

    <div style="font-size:9px;color:#666;letter-spacing:1.5px;margin-bottom:6px;">MANAGER AGENT</div>
    <div style="font-size:13px;margin-bottom:14px;">🐒 <strong style="color:${d.color}">${d.manager}</strong>
      <span style="font-size:10px;color:#666;margin-left:6px;">→ board: ${d.board}</span>
    </div>

    <div style="font-size:9px;color:#666;letter-spacing:1.5px;margin-bottom:7px;">SPECIALIST AGENTS</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;">
      ${d.agents.map(a=>`<span style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
        border-radius:7px;padding:3px 8px;font-size:9px;color:#bbb;">🐒 ${a}</span>`).join('')}
    </div>

    <div style="padding-top:13px;border-top:1px solid rgba(255,255,255,.07);">
      <div style="font-family:monospace;font-size:10px;color:#8877cc;line-height:2;">
        /mastermind:${d.name.toLowerCase()} [prompt]<br>
        /mastermind:${d.name.toLowerCase()} [prompt] --auto<br>
        /mastermind:master [prompt] --iterate 3
      </div>
    </div>
  `;

  document.getElementById('detail-panel').classList.add('visible');
}

/* ── Show Monograph panel ── */
function showMonograph() {
  if (activeIdx !== null && activeIdx !== 'mono') {
    document.getElementById(`dn-${activeIdx}`)?.classList.remove('active');
  }
  if (activeIdx === 'mono') { closePanel(); return; }
  activeIdx = 'mono';

  document.getElementById('detail-content').innerHTML = `
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:44px;line-height:1">📊</div>
      <div style="font-size:17px;font-weight:900;color:#b090ff;letter-spacing:2px;margin-top:6px;">MONOGRAPH</div>
      <div style="font-size:9px;color:#666;letter-spacing:2px;margin-top:3px;">KNOWLEDGE GRAPH ENGINE</div>
    </div>

    <p style="font-size:11px;color:#aaa;line-height:1.75;margin-bottom:14px;">
      Mastermind's long-term memory. Every run writes decisions, lessons, and patterns into a
      three-tier brain that self-compacts and improves over time.
    </p>

    <div style="font-size:9px;color:#666;letter-spacing:1.5px;margin-bottom:8px;">THREE-TIER BRAIN</div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px;">
      <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
          border-radius:9px;padding:9px 12px;">
        <div style="font-size:10px;color:#ccc;margin-bottom:2px;">📁 Tier 1 — Raw Logs</div>
        <div style="font-size:9px;color:#777;">AgentDB · append-only · scored per run</div>
      </div>
      <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
          border-radius:9px;padding:9px 12px;">
        <div style="font-size:10px;color:#ccc;margin-bottom:2px;">📋 Tier 2 — Weekly Summaries</div>
        <div style="font-size:9px;color:#777;">LLM-distilled per domain · auto-compacted</div>
      </div>
      <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
          border-radius:9px;padding:9px 12px;">
        <div style="font-size:10px;color:#ccc;margin-bottom:2px;">🌐 Tier 3 — Core Principles</div>
        <div style="font-size:9px;color:#777;">Graph-consolidated · cross-domain · exceptions as edges</div>
      </div>
    </div>

    <div style="font-size:9px;color:#666;letter-spacing:1.5px;margin-bottom:7px;">MEMORY SCORE FORMULA</div>
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
        border-radius:9px;padding:9px 12px;font-family:monospace;font-size:10px;color:#c0a0ff;
        margin-bottom:14px;text-align:center;">
      score = confidence × 1/(days+1) × log(uses+1)
    </div>

    <div style="font-size:9px;color:#666;letter-spacing:1.5px;margin-bottom:7px;">BRAIN COMMANDS</div>
    <div style="font-family:monospace;font-size:10px;color:#8877cc;line-height:2.2;">
      /mastermind:brain status<br>
      /mastermind:brain compact<br>
      /mastermind:brain refresh --domain X<br>
      /mastermind:brain inspect --tier 1<br>
      /mastermind:brain forget --query "..."<br>
      /mastermind:brain reset --domain X --confirm
    </div>
  `;

  document.getElementById('detail-panel').classList.add('visible');
}

/* ── Close panel ── */
function closePanel() {
  if (activeIdx !== null && activeIdx !== 'mono') {
    document.getElementById(`dn-${activeIdx}`)?.classList.remove('active');
  }
  activeIdx = null;
  document.getElementById('detail-panel').classList.remove('visible');
}

/* ── Close on backdrop click ── */
document.getElementById('stage').addEventListener('click', e => {
  if (e.target === document.getElementById('stage') ||
      e.target === document.getElementById('table')) {
    closePanel();
  }
});
</script>
</body>
</html>
