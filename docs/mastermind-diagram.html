<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASTERMIND — Live Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #07071a;
  font-family: 'Courier New', Courier, monospace;
  color: #e0e0ff;
  user-select: none;
}

/* ── Main layout ── */
#app { display: flex; height: 100vh; }
#sidebar {
  width: 220px; flex-shrink: 0;
  background: rgba(5,3,16,0.96);
  border-right: 1px solid rgba(80,50,180,0.22);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 10;
}
#stage-wrap { flex: 1; position: relative; overflow: hidden; }
#detail-panel {
  width: 0; flex-shrink: 0; overflow: hidden;
  background: rgba(5,3,16,0.97);
  border-left: 1px solid rgba(80,50,180,0.22);
  transition: width 0.3s ease;
  display: flex; flex-direction: column;
  z-index: 10;
}
#detail-panel.open { width: 280px; }
#stage { position: absolute; inset: 0; width: 100%; height: 100%; }

/* ── Sidebar ── */
#sb-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid rgba(80,50,180,0.18);
  flex-shrink: 0;
}
#sb-title {
  font-size: 8px; letter-spacing: 4px; color: #3a3a80; margin-bottom: 4px;
}
.live-row { display: flex; align-items: center; gap: 6px; }
.l-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #252560; flex-shrink: 0;
  transition: background 0.5s;
}
.l-dot.on { background: #28c068; animation: ldp 2s ease-in-out infinite; }
@keyframes ldp { 0%,100%{opacity:1} 50%{opacity:0.4} }
#l-status { font-size: 9px; letter-spacing: 2px; color: #303070; }
#l-agents { font-size: 8px; color: #252558; margin-left: auto; }
#sb-sessions {
  flex: 1; overflow-y: auto; padding: 8px 0;
  scrollbar-width: thin; scrollbar-color: rgba(80,50,180,0.3) transparent;
}
#sb-sessions::-webkit-scrollbar { width: 4px; }
#sb-sessions::-webkit-scrollbar-thumb { background: rgba(80,50,180,0.3); border-radius: 2px; }
.sess-item {
  padding: 8px 14px; cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}
.sess-item:hover { background: rgba(80,50,180,0.1); }
.sess-item.active { border-left-color: #7050d0; background: rgba(80,50,180,0.12); }
.sess-item.running { border-left-color: #28c068; }
.sess-ts { font-size: 8px; color: #303060; margin-bottom: 3px; }
.sess-prompt {
  font-size: 9px; color: #5a5a90; line-height: 1.4;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;
}
.sess-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.sess-badge {
  font-size: 7px; padding: 1px 5px; border-radius: 3px;
  border: 1px solid rgba(80,50,180,0.3); color: #5050a0;
  background: rgba(80,50,180,0.1);
}
.sess-badge.running-badge { border-color: rgba(40,192,104,0.4); color: #28c068; background: rgba(40,192,104,0.08); }
.sess-trace-link {
  font-size: 7px; color: #3a3a70; text-decoration: none; letter-spacing: 0.5px;
  padding: 1px 5px; border: 1px solid rgba(80,50,180,0.2); border-radius: 3px;
  margin-left: auto; flex-shrink: 0;
}
.sess-trace-link:hover { color: #8080cc; border-color: rgba(80,50,180,0.5); }
.dp-export-btn {
  font-size: 9px; font-family: inherit; color: #6070b0; text-decoration: none;
  padding: 4px 8px; border: 1px solid rgba(80,50,180,0.25); border-radius: 4px;
  background: rgba(80,50,180,0.07); cursor: pointer; letter-spacing: 0.3px;
}
.dp-export-btn:hover { color: #9090e0; border-color: rgba(80,50,180,0.5); background: rgba(80,50,180,0.15); }
#sb-no-sessions {
  padding: 20px 14px; font-size: 9px; color: #252558; line-height: 1.7;
  text-align: center;
}
#sb-movie-btn {
  margin: 10px 14px;
  background: rgba(80,50,180,0.12);
  border: 1px solid rgba(80,50,180,0.35);
  color: #7050c0; font-size: 9px; letter-spacing: 2px;
  border-radius: 6px; padding: 7px; cursor: pointer; width: calc(100% - 28px);
  transition: background 0.15s, color 0.15s;
  font-family: 'Courier New', monospace;
}
#sb-movie-btn:hover { background: rgba(80,50,180,0.25); color: #d0b0ff; }
#sb-movie-btn.active { background: rgba(80,50,180,0.25); color: #d0b0ff; border-color: rgba(80,50,180,0.6); }

/* ── SVG title overlay ── */
#title-wrap {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  text-align: center; pointer-events: none; z-index: 5;
}
#title-h1 {
  font-size: 19px; font-weight: 900; letter-spacing: 12px;
  background: linear-gradient(135deg, #c880ff, #7040ff, #ff60ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#title-sub { font-size: 8px; color: #38388a; letter-spacing: 3.5px; margin-top: 4px; }

/* ── Prompt box ── */
#prompt-box {
  position: absolute; bottom: 76px; left: 50%; transform: translateX(-50%);
  min-width: 340px; max-width: 500px;
  background: rgba(6,4,22,0.96);
  border: 1px solid rgba(130,80,255,0.5);
  border-radius: 12px; padding: 10px 18px;
  z-index: 50; opacity: 0;
  box-shadow: 0 4px 28px rgba(100,50,255,0.16);
  backdrop-filter: blur(18px);
}
#p-tag { font-size: 8px; letter-spacing: 3px; color: #48489a; margin-bottom: 4px; }
#p-line { font-size: 12.5px; color: #90c8ff; display: flex; align-items: center; gap: 2px; min-height: 19px; }
#p-cursor {
  display: inline-block; width: 2px; height: 14px;
  background: #90c8ff; flex-shrink: 0;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Activity log ── */
#activity-log {
  position: absolute; left: 10px; bottom: 76px;
  width: 240px;
  background: rgba(5,3,18,0.93);
  border: 1px solid rgba(70,45,165,0.35);
  border-radius: 10px; padding: 9px 12px;
  z-index: 50; opacity: 0;
}
#log-title { font-size: 7.5px; letter-spacing: 3px; color: #282870; margin-bottom: 6px;
  padding-bottom: 5px; border-bottom: 1px solid rgba(70,45,165,0.18); }
#log-entries { font-size: 9px; line-height: 1.95; max-height: 160px; overflow: hidden; }
.log-row { display: flex; gap: 5px; opacity: 0; }
.log-tag { font-weight: bold; min-width: 58px; flex-shrink: 0; }
.log-msg { color: #525298; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }

/* ── Mode banner ── */
#mode-banner {
  position: absolute; top: 14px; right: 10px;
  font-size: 8px; letter-spacing: 3px; color: #303070;
  z-index: 5; pointer-events: none;
}
#mode-banner.live-mode { color: #28c068; }

/* ── Control bar ── */
#ctrl {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 7px;
  background: rgba(8,6,26,0.95);
  border: 1px solid rgba(100,60,220,0.35);
  border-radius: 26px; padding: 6px 16px;
  z-index: 100; backdrop-filter: blur(18px);
  opacity: 0;
}
.c-btn {
  background: none; border: 1px solid rgba(100,60,220,0.4);
  color: #7858d0; width: 26px; height: 26px; border-radius: 50%;
  cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s; flex-shrink: 0; line-height: 1;
}
.c-btn:hover { background: rgba(100,60,220,0.2); color: #d0b0ff; }
.c-btn.disabled { opacity: 0.3; pointer-events: none; }
#scrubber {
  width: 180px; height: 3px; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  background: rgba(100,60,220,0.2); border-radius: 2px; outline: none;
}
#scrubber::-webkit-slider-thumb {
  -webkit-appearance: none; width: 11px; height: 11px;
  border-radius: 50%; background: #7858d0; cursor: pointer; border: none;
}
#t-disp { font-size: 9px; color: #484888; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
#spd {
  background: rgba(8,6,26,0.85); border: 1px solid rgba(100,60,220,0.3);
  color: #6050b0; font-size: 9px; font-family: 'Courier New', monospace;
  border-radius: 4px; padding: 2px 4px; cursor: pointer; outline: none;
}
#spd option { background: #0d0a20; }

/* ── Detail panel ── */
#dp-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(80,50,180,0.18); flex-shrink: 0;
}
#dp-close {
  float: right; background: none; border: none; color: #404070;
  cursor: pointer; font-size: 13px; padding: 0; line-height: 1;
}
#dp-close:hover { color: #a090e0; }
#dp-title { font-size: 9px; letter-spacing: 3px; color: #5050a0; margin-top: 2px; }
#dp-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
#dp-body { flex: 1; overflow-y: auto; padding: 12px 16px; scrollbar-width: thin; scrollbar-color: rgba(80,50,180,0.3) transparent; }
#dp-body::-webkit-scrollbar { width: 4px; }
#dp-body::-webkit-scrollbar-thumb { background: rgba(80,50,180,0.3); border-radius: 2px; }
.dp-section { margin-bottom: 14px; }
.dp-section-title { font-size: 7.5px; letter-spacing: 3px; color: #303068; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(80,50,180,0.15); }
.dp-event { font-size: 9px; line-height: 1.6; color: #5060a0; margin-bottom: 4px; }
.dp-event .ev-ts { color: #282855; }
.dp-event .ev-type { color: inherit; font-weight: bold; }
.dp-artifact { font-size: 9px; color: #6070a0; padding: 3px 6px; background: rgba(80,50,180,0.08); border-radius: 3px; margin-bottom: 3px; }
.dp-agent { display: inline-block; font-size: 8px; padding: 2px 7px; border-radius: 10px; margin: 2px 3px 2px 0; border: 1px solid rgba(80,50,180,0.3); color: #6060a0; }
</style>
</head>
<body>
<div id="app">
  <!-- ── Left sidebar: session history ── -->
  <div id="sidebar">
    <div id="sb-header">
      <div id="sb-title">SESSIONS</div>
      <div class="live-row">
        <div class="l-dot" id="l-dot"></div>
        <span id="l-status">OFFLINE</span>
        <span id="l-agents">0 agents</span>
      </div>
    </div>
    <div id="sb-sessions">
      <div id="sb-no-sessions">No sessions yet.<br>Run <span style="color:#6060a0">/mastermind</span><br>to start.</div>
    </div>
    <button id="sb-movie-btn" onclick="toggleMovieMode()">▶ MOVIE MODE</button>
  </div>

  <!-- ── Stage ── -->
  <div id="stage-wrap">
    <!-- SVG -->
    <svg id="stage" viewBox="0 0 960 720" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow" x="-55%" y="-55%" width="210%" height="210%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="bloom" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="tbl-g" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#180840" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#07071a" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="brain-g" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#2c1aaa"/>
          <stop offset="100%" stop-color="#12083a"/>
        </radialGradient>
      </defs>
      <g id="stars"></g>
      <circle cx="480" cy="360" r="260" fill="url(#tbl-g)" id="tbl-bg"/>
      <circle cx="480" cy="360" r="260" fill="none" stroke="#1c0d46" stroke-width="1.5" id="tbl-ring"/>
      <circle cx="480" cy="360" r="205" fill="none" stroke="#110830" stroke-width="1" stroke-dasharray="5 10" id="orb-ring"/>
      <g id="spokes"></g>
      <g id="domains"></g>
      <g id="packets"></g>
      <g id="brain">
        <circle cx="480" cy="360" r="75" fill="#170d4c" opacity="0.35" filter="url(#bloom)" id="brain-glow"/>
        <circle cx="480" cy="360" r="46" fill="url(#brain-g)" id="brain-body"/>
        <circle cx="480" cy="360" r="46" fill="none" stroke="#5c30b8" stroke-width="2.5" id="brain-ring"/>
        <circle cx="480" cy="360" r="55" fill="none" stroke="#5c30b8" stroke-width="0.8" opacity="0.2" id="pulse-ring"/>
        <text x="480" y="375" text-anchor="middle" font-size="34" id="brain-emoji">🧠</text>
        <text x="480" y="394" text-anchor="middle" font-size="7" fill="#5c30b8" letter-spacing="2.5"
          font-family="'Courier New',monospace" id="brain-lbl">MASTERMIND</text>
      </g>
    </svg>

    <!-- Overlays -->
    <div id="title-wrap">
      <div id="title-h1">MASTERMIND</div>
      <div id="title-sub">AUTONOMOUS BUSINESS BRAIN · 10 DOMAINS · SELF-IMPROVING</div>
    </div>

    <div id="mode-banner">LIVE</div>

    <div id="prompt-box">
      <div id="p-tag">USER PROMPT</div>
      <div id="p-line"><span id="p-text"></span><span id="p-cursor"></span></div>
    </div>

    <div id="activity-log">
      <div id="log-title">ACTIVITY LOG</div>
      <div id="log-entries"></div>
    </div>

    <div id="ctrl">
      <button class="c-btn disabled" id="btn-restart" title="Restart">↺</button>
      <button class="c-btn disabled" id="btn-play" title="Play">▶</button>
      <button class="c-btn disabled" id="btn-pause" title="Pause">⏸</button>
      <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1" disabled/>
      <span id="t-disp">—</span>
      <select id="spd">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
        <option value="3">3×</option>
      </select>
    </div>
  </div>

  <!-- ── Right panel: session/domain detail ── -->
  <div id="detail-panel">
    <div id="dp-header">
      <button id="dp-close" onclick="closeDetail()">✕</button>
      <span id="dp-emoji"></span>
      <div id="dp-title">SELECT A DOMAIN OR SESSION</div>
    </div>
    <div id="dp-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
'use strict';

// ── Layout constants (SVG viewBox 0 0 960 720) ────────────────────────────────
const CX = 480, CY = 360, R = 205;
const PERIM = 2 * Math.PI * 34;
const SCRAMBLE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!';

// ── Domain definitions ─────────────────────────────────────────────────────────
const DOMAINS = [
  { id:'build',    emoji:'⚙️',  label:'BUILD',     color:'#60a5fa', tag:'[BUILD]',    msg:'Spawning architect + coder + tester', cmd:'/mastermind:build' },
  { id:'idea',     emoji:'💡',  label:'IDEA',      color:'#fbbf24', tag:'[IDEA]',     msg:'Generating product concepts',          cmd:'/mastermind:idea' },
  { id:'marketing',emoji:'📣',  label:'MARKETING', color:'#f472b6', tag:'[MARKET]',   msg:'Crafting launch campaign',             cmd:'/mastermind:marketing' },
  { id:'review',   emoji:'🔍',  label:'REVIEW',    color:'#34d399', tag:'[REVIEW]',   msg:'Auditing code quality',                cmd:'/mastermind:review' },
  { id:'research', emoji:'🔬',  label:'RESEARCH',  color:'#a78bfa', tag:'[RESEARCH]', msg:'Scraping competitor sites',            cmd:'/mastermind:research' },
  { id:'content',  emoji:'✍️', label:'CONTENT',   color:'#fb923c', tag:'[CONTENT]',  msg:'Writing blog + social posts',          cmd:'/mastermind:content' },
  { id:'release',  emoji:'🚀',  label:'RELEASE',   color:'#22d3ee', tag:'[RELEASE]',  msg:'Preparing deployment pipeline',        cmd:'/mastermind:release' },
  { id:'sales',    emoji:'💼',  label:'SALES',     color:'#f87171', tag:'[SALES]',    msg:'Building outreach sequences',          cmd:'/mastermind:sales' },
  { id:'ops',      emoji:'⚡',  label:'OPS',       color:'#4ade80', tag:'[OPS]',      msg:'Automating workflows',                 cmd:'/mastermind:ops' },
  { id:'finance',  emoji:'💰',  label:'FINANCE',   color:'#fde68a', tag:'[FINANCE]',  msg:'Forecasting revenue model',            cmd:'/mastermind:finance' },
];
DOMAINS.forEach((d, i) => {
  const a = -Math.PI / 2 + (i / DOMAINS.length) * 2 * Math.PI;
  d.x = Math.round(CX + R * Math.cos(a));
  d.y = Math.round(CY + R * Math.sin(a));
  d.events = []; // live event history per domain
});

const IC = [
  [0,3,'code→review'], [3,6,'LGTM→ship'], [1,2,'concepts→copy'],
  [2,5,'brief→write'], [4,1,'data→ideate'], [7,8,'leads→ops'], [8,9,'metrics→model'],
];

// ── SVG helpers ────────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
const mk = (tag, a={}) => {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(a)) el.setAttribute(k, v);
  return el;
};

// ── Build star field ───────────────────────────────────────────────────────────
const starsG = document.getElementById('stars');
for (let i = 0; i < 170; i++) {
  starsG.appendChild(mk('circle', {
    cx: (Math.random()*960).toFixed(1), cy: (Math.random()*720).toFixed(1),
    r: (Math.random() < 0.1 ? Math.random()*1.5+0.8 : Math.random()*0.8+0.15).toFixed(1),
    fill: `rgba(160,150,255,${(Math.random()*0.35+0.08).toFixed(2)})`
  }));
}

// ── Build spokes ───────────────────────────────────────────────────────────────
const spokesG = document.getElementById('spokes');
const spokeEls = DOMAINS.map(d => {
  const len = Math.hypot(d.x-CX, d.y-CY);
  const el = mk('line', { x1:CX, y1:CY, x2:d.x, y2:d.y,
    stroke:d.color, 'stroke-width':'1', opacity:'0.35',
    'stroke-dasharray':len.toFixed(1), 'stroke-dashoffset':len.toFixed(1),
    'stroke-linecap':'round' });
  spokesG.appendChild(el);
  return { el, len };
});

// ── Build domain nodes ─────────────────────────────────────────────────────────
const domainsG = document.getElementById('domains');
const domEls = DOMAINS.map(d => {
  const g = mk('g', { id:`dn-${d.id}`, transform:`translate(${d.x},${d.y})`, style:'cursor:pointer' });
  g.appendChild(mk('circle', { r:'44', fill:'none', stroke:d.color, 'stroke-width':'1', opacity:'0', id:`gr-${d.id}` }));
  g.appendChild(mk('circle', { r:'34', fill:'none', stroke:d.color, 'stroke-width':'2.8',
    'stroke-dasharray':PERIM.toFixed(1), 'stroke-dashoffset':PERIM.toFixed(1),
    'stroke-linecap':'round', transform:'rotate(-90)', id:`pr-${d.id}` }));
  g.appendChild(mk('circle', { r:'28', fill:'#0b0920', stroke:d.color, 'stroke-width':'1.8' }));
  const emj = mk('text', { x:'0', y:'9', 'text-anchor':'middle', 'font-size':'20' });
  emj.textContent = d.emoji;
  g.appendChild(emj);
  const lbl = mk('text', { x:'0', y:'46', 'text-anchor':'middle', 'font-size':'7.5',
    fill:d.color, 'letter-spacing':'1.5', 'font-family':"'Courier New',monospace" });
  lbl.textContent = d.label;
  g.appendChild(lbl);
  g.appendChild(mk('circle', { r:'10', cx:'22', cy:'-22', fill:'#0b0920',
    stroke:d.color, 'stroke-width':'1.5', opacity:'0', id:`cb-${d.id}` }));
  const chk = mk('text', { x:'22', y:'-18', 'text-anchor':'middle', 'font-size':'10',
    fill:d.color, opacity:'0', id:`ct-${d.id}` });
  chk.textContent = '✓';
  g.appendChild(chk);
  // Invisible hit target (wider than visual)
  const hit = mk('circle', { r:'50', fill:'transparent' });
  hit.addEventListener('click', (e) => { e.stopPropagation(); openDomainDetail(d); });
  g.appendChild(hit);
  domainsG.appendChild(g);
  return g;
});

// ── Initial GSAP states ────────────────────────────────────────────────────────
gsap.set([...starsG.children], { opacity: 0 });
gsap.set(['#tbl-bg','#tbl-ring','#orb-ring','#brain'], { opacity: 0 });
gsap.set(domEls, { scale: 0, opacity: 0, transformOrigin: 'center center' });
gsap.set(['#title-h1','#title-sub'], { opacity: 0 });
gsap.set('#ctrl', { opacity: 0 });
gsap.set('#activity-log', { opacity: 0 });
gsap.set('#prompt-box', { opacity: 0 });

// ── Ambient star twinkle ───────────────────────────────────────────────────────
gsap.to([...starsG.children], {
  opacity: 'random(0.06, 0.6)',
  duration: 'random(2, 5)',
  stagger: { amount: 16, from: 'random', repeat: -1, yoyo: true, ease: 'sine.inOut' },
  delay: 1,
});

// ── Static table appears (always shown) ───────────────────────────────────────
function buildStage() {
  const tl = gsap.timeline();
  tl.to([...starsG.children], { opacity: 1, stagger: { amount: 1.2, from: 'random' } }, 0)
    .set('#title-h1', { opacity: 1 }, 0.5)
    .to({}, {
      duration: 1.4,
      onUpdate() {
        const p = this.progress();
        const T = 'MASTERMIND';
        document.getElementById('title-h1').textContent = T.split('').map((c,i) =>
          i < Math.floor(p * T.length) ? c : SCRAMBLE[Math.floor(Math.random()*SCRAMBLE.length)]
        ).join('');
      },
      onComplete() { document.getElementById('title-h1').textContent = 'MASTERMIND'; }
    }, 0.5)
    .to('#title-sub', { opacity: 1, duration: 0.7 }, 1.4)
    .to(['#tbl-bg','#tbl-ring'], { opacity: 1, duration: 1.0 }, 2.2)
    .to('#orb-ring', { opacity: 1, duration: 0.8 }, 2.6)
    .fromTo('#brain', { opacity:0, scale:0, transformOrigin:'480px 360px' },
      { opacity:1, scale:1, duration:0.9, ease:'back.out(1.9)' }, 3.2)
    .fromTo('#pulse-ring', { attr:{r:48}, opacity:0.6 }, { attr:{r:70}, opacity:0, duration:1.0 }, 3.3);
  DOMAINS.forEach((d,i) => {
    tl.fromTo(domEls[i], { scale:0, opacity:0 },
      { scale:1, opacity:1, duration:0.55, ease:'back.out(2.3)', transformOrigin:'center center' },
      3.8 + i*0.28);
    tl.to(spokeEls[i].el, { strokeDashoffset:0, duration:0.5, ease:'power2.in' }, 3.88 + i*0.28);
  });
  tl.to('#ctrl', { opacity:1, duration:0.5 }, 7.0)
    .to('#activity-log', { opacity:1, duration:0.5 }, 7.2);
  return tl;
}

// ── Movie mode GSAP timeline ───────────────────────────────────────────────────
let movieTl = null;
let isMovieMode = false;

function buildMovieTl() {
  const USER_PROMPT = '/mastermind "launch v2.0 — research, build, market, ship" --auto';
  const tl = gsap.timeline({ paused: true, defaults: { ease:'power2.out' } });

  tl.to('#prompt-box', { opacity:1, duration:0.4 }, 0);
  tl.to({}, {
    duration: USER_PROMPT.length * 0.033,
    onStart() { document.getElementById('p-tag').textContent='USER PROMPT'; document.getElementById('p-text').textContent=''; },
    onUpdate() { document.getElementById('p-text').textContent = USER_PROMPT.slice(0, Math.ceil(this.progress()*USER_PROMPT.length)); },
    onComplete() { document.getElementById('p-text').textContent = USER_PROMPT; }
  }, 0.3);

  const fireAt = 0.3 + USER_PROMPT.length * 0.033 + 0.5;
  tl.to('#prompt-box', { opacity:0, y:-10, duration:0.35 }, fireAt);
  tl.set('#prompt-box', { y:0 }, fireAt+0.4);
  tl.add(() => spawnPacket(480, 700, CX, CY, '#8855ee', 'PROMPT'), fireAt+0.2);
  tl.to('#brain-ring', { attr:{stroke:'#cc70ff','stroke-width':5}, duration:0.3 }, fireAt+0.85);
  tl.to('#brain-ring', { attr:{stroke:'#5c30b8','stroke-width':2.5}, duration:0.8 }, fireAt+1.15);
  tl.to('#brain-glow', { attr:{r:100}, opacity:0.6, duration:0.4 }, fireAt+0.85);
  tl.to('#brain-glow', { attr:{r:75}, opacity:0.35, duration:0.9 }, fireAt+1.25);
  tl.add(() => { document.getElementById('brain-lbl').textContent='DISPATCHING'; addLog('[🧠]','Brain loaded. Decomposing...','#9070ff'); }, fireAt+0.9);

  tl.to('#prompt-box', { opacity:1, duration:0.3 }, fireAt+1.8);
  const activateAt = fireAt+2.2;

  DOMAINS.forEach((d,i) => {
    const t = activateAt + i*0.85;
    tl.to({}, {
      duration: d.cmd.length*0.025,
      onStart() { document.getElementById('p-tag').textContent=`→ ${d.label}`; document.getElementById('p-text').textContent=''; },
      onUpdate() { document.getElementById('p-text').textContent = d.cmd.slice(0, Math.ceil(this.progress()*d.cmd.length)); },
      onComplete() { document.getElementById('p-text').textContent = d.cmd; }
    }, t);
    tl.add(() => spawnPacket(CX, CY, d.x, d.y, d.color), t + d.cmd.length*0.025 + 0.06);
    tl.to(`#gr-${d.id}`, { opacity:0.85, attr:{r:52}, duration:0.3 }, t + d.cmd.length*0.025 + 0.6);
    tl.to(`#gr-${d.id}`, { opacity:0.2, attr:{r:44}, duration:0.9 }, t + d.cmd.length*0.025 + 0.9);
    tl.to(`#pr-${d.id}`, { strokeDashoffset:0, duration:2.2, ease:'power1.inOut' }, t + d.cmd.length*0.025 + 0.6);
    tl.add(() => addLog(d.tag, d.msg, d.color), t + d.cmd.length*0.025 + 0.65);
  });

  const icAt = activateAt + DOMAINS.length*0.85 + 2.5;
  tl.to('#prompt-box', { opacity:0, duration:0.3 }, icAt);
  IC.forEach(([fi,ti,lbl],j) => {
    const t = icAt + j*0.6;
    tl.add(() => spawnPacket(DOMAINS[fi].x, DOMAINS[fi].y, DOMAINS[ti].x, DOMAINS[ti].y, DOMAINS[fi].color, lbl), t);
    tl.to(`#gr-${DOMAINS[ti].id}`, { opacity:0.6, attr:{r:50}, duration:0.28 }, t+0.72);
    tl.to(`#gr-${DOMAINS[ti].id}`, { opacity:0.2, attr:{r:44}, duration:0.8 }, t+1.0);
    tl.add(() => addLog('[IC]', lbl, '#7080d8'), t+0.5);
  });

  const resAt = icAt + IC.length*0.6 + 0.9;
  DOMAINS.forEach((d,i) => {
    const t = resAt + i*0.26;
    tl.add(() => spawnPacket(d.x, d.y, CX, CY, d.color), t);
    tl.to(`#cb-${d.id}`, { opacity:1, duration:0.28 }, t+0.72);
    tl.to(`#ct-${d.id}`, { opacity:1, duration:0.28 }, t+0.72);
  });

  const doneAt = resAt + DOMAINS.length*0.26 + 1.2;
  tl.to('#brain-glow', { attr:{r:125}, opacity:0.9, duration:0.45 }, doneAt);
  tl.to('#brain-glow', { attr:{r:78}, opacity:0.35, duration:1.5 }, doneAt+0.45);
  tl.to('#brain-ring', { attr:{stroke:'#ff88ff','stroke-width':6}, duration:0.4 }, doneAt);
  tl.to('#brain-ring', { attr:{stroke:'#5c30b8','stroke-width':2.5}, duration:1.5 }, doneAt+0.45);
  tl.to('#brain-emoji', { scale:1.5, transformOrigin:'480px 360px', duration:0.45, ease:'back.out(2)' }, doneAt);
  tl.to('#brain-emoji', { scale:1.0, duration:0.9 }, doneAt+0.45);
  tl.add(() => { document.getElementById('brain-lbl').textContent='MASTERMIND'; addLog('[✓]','Run complete — 10 domains','#40e880'); }, doneAt+0.1);
  const FINAL = 'RUN COMPLETE · 10 DOMAINS · ALL AGENTS DONE ✓';
  tl.to('#prompt-box', { opacity:1, duration:0.4 }, doneAt+0.6);
  tl.to({}, {
    duration: FINAL.length*0.028,
    onStart() { document.getElementById('p-tag').textContent='MASTERMIND'; document.getElementById('p-text').textContent=''; },
    onUpdate() { document.getElementById('p-text').textContent = FINAL.slice(0, Math.ceil(this.progress()*FINAL.length)); },
    onComplete() { document.getElementById('p-text').textContent = FINAL; }
  }, doneAt+0.75);

  return tl;
}

function toggleMovieMode() {
  isMovieMode = !isMovieMode;
  const btn = document.getElementById('sb-movie-btn');
  const banner = document.getElementById('mode-banner');
  const scrubEl = document.getElementById('scrubber');
  const tDisp = document.getElementById('t-disp');

  if (isMovieMode) {
    btn.classList.add('active');
    btn.textContent = '■ EXIT MOVIE';
    banner.textContent = 'MOVIE';
    banner.classList.remove('live-mode');
    // Enable scrubber/play/pause
    ['btn-restart','btn-play','btn-pause'].forEach(id => document.getElementById(id).classList.remove('disabled'));
    scrubEl.disabled = false;
    // Reset log & dynamic state
    document.getElementById('log-entries').innerHTML = '';
    document.getElementById('p-text').textContent = '';
    document.getElementById('brain-lbl').textContent = 'MASTERMIND';
    // Reset progress rings and badges
    DOMAINS.forEach(d => {
      gsap.set(`#pr-${d.id}`, { strokeDashoffset: PERIM });
      gsap.set(`#cb-${d.id}`, { opacity: 0 });
      gsap.set(`#ct-${d.id}`, { opacity: 0 });
      gsap.set(`#gr-${d.id}`, { opacity: 0, attr: { r: 44 } });
    });
    // Build and play
    if (movieTl) { movieTl.kill(); }
    movieTl = buildMovieTl();
    // Wire controls
    document.getElementById('btn-play').onclick  = () => movieTl.resume();
    document.getElementById('btn-pause').onclick = () => movieTl.pause();
    document.getElementById('btn-restart').onclick = () => {
      document.getElementById('packets').innerHTML = '';
      document.getElementById('log-entries').innerHTML = '';
      document.getElementById('p-text').textContent = '';
      document.getElementById('brain-lbl').textContent = 'MASTERMIND';
      DOMAINS.forEach(d => {
        gsap.set(`#pr-${d.id}`, { strokeDashoffset: PERIM });
        gsap.set(`#cb-${d.id}`, { opacity: 0 });
        gsap.set(`#ct-${d.id}`, { opacity: 0 });
        gsap.set(`#gr-${d.id}`, { opacity: 0, attr: { r: 44 } });
      });
      movieTl.restart();
    };
    document.getElementById('spd').onchange = e => movieTl && movieTl.timeScale(Number(e.target.value));
    let scrubbing = false;
    scrubEl.addEventListener('mousedown', () => { scrubbing=true; movieTl&&movieTl.pause(); });
    scrubEl.addEventListener('mouseup', () => { scrubbing=false; });
    scrubEl.addEventListener('input', () => { if(movieTl) movieTl.progress(Number(scrubEl.value)/100); tDisp.textContent = (movieTl?movieTl.time():0).toFixed(1)+'s'; });
    gsap.ticker.add(() => {
      if(!scrubbing && movieTl && movieTl.totalDuration()>0) {
        scrubEl.value = movieTl.progress()*100;
        tDisp.textContent = movieTl.time().toFixed(1)+'s';
      }
    });
    movieTl.play();
  } else {
    btn.classList.remove('active');
    btn.textContent = '▶ MOVIE MODE';
    banner.textContent = 'LIVE';
    banner.classList.add('live-mode');
    ['btn-restart','btn-play','btn-pause'].forEach(id => document.getElementById(id).classList.add('disabled'));
    scrubEl.disabled = true;
    tDisp.textContent = '—';
    document.getElementById('prompt-box').style.opacity = '0';
    if (movieTl) { movieTl.kill(); movieTl = null; }
  }
}

// ── Packet animation utility ───────────────────────────────────────────────────
function spawnPacket(fx, fy, tx, ty, color, lbl) {
  const g = mk('g', {});
  g.appendChild(mk('circle', { r:'7', fill:color, filter:'url(#glow)', opacity:'0.55' }));
  g.appendChild(mk('circle', { r:'3.5', fill:'#fff' }));
  if (lbl) {
    const t = mk('text', { x:'10', y:'4', 'font-size':'7', fill:color, 'font-family':"'Courier New',monospace" });
    t.textContent = lbl;
    g.appendChild(t);
  }
  document.getElementById('packets').appendChild(g);
  gsap.set(g, { x:fx, y:fy, opacity:0 });
  gsap.timeline({ onComplete: ()=>g.remove() })
    .to(g, { opacity:1, duration:0.12 })
    .to(g, { x:tx, y:ty, duration:0.88, ease:'power2.inOut' }, '<')
    .to(g, { opacity:0, scale:1.5, transformOrigin:'0 0', duration:0.2 });
}

// ── Activity log ───────────────────────────────────────────────────────────────
function addLog(tag, msg, color) {
  const wrap = document.getElementById('log-entries');
  const row = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML = `<span class="log-tag" style="color:${color}">${tag}</span><span class="log-msg">${msg}</span>`;
  wrap.appendChild(row);
  gsap.fromTo(row, { opacity:0 }, { opacity:1, duration:0.3 });
  const rows = wrap.querySelectorAll('.log-row');
  if (rows.length > 10) {
    gsap.to(rows[0], { opacity:0, height:0, duration:0.22, onComplete:()=>rows[0].remove() });
  }
}

// ── Live event handler ─────────────────────────────────────────────────────────
function handleLiveEvent(ev) {
  if (isMovieMode) return; // live events suppressed in movie mode

  if (ev.type === 'session:start') {
    gsap.to('#brain-ring', { attr:{stroke:'#cc70ff','stroke-width':5}, duration:0.3 });
    gsap.to('#brain-ring', { attr:{stroke:'#5c30b8','stroke-width':2.5}, duration:0.8, delay:0.3 });
    gsap.to('#brain-glow', { attr:{r:100}, opacity:0.65, duration:0.4 });
    gsap.to('#brain-glow', { attr:{r:75}, opacity:0.35, duration:0.9, delay:0.4 });
    gsap.to('#brain-emoji', { scale:1.25, transformOrigin:'480px 360px', duration:0.32, ease:'back.out(2)' });
    gsap.to('#brain-emoji', { scale:1.0, duration:0.5, delay:0.32 });
    document.getElementById('brain-lbl').textContent = 'ANALYZING...';
    addLog('[SESSION]', ev.prompt ? ev.prompt.slice(0,28)+'…' : 'started', '#9070ff');
    // Show prompt
    if (ev.prompt) {
      const box = document.getElementById('prompt-box');
      document.getElementById('p-tag').textContent = 'RUNNING';
      document.getElementById('p-text').textContent = ev.prompt;
      gsap.to(box, { opacity:1, duration:0.4 });
    }
    refreshSessions();
  }

  else if (ev.type === 'domain:dispatch') {
    const d = DOMAINS.find(x => x.id === ev.domain);
    if (!d) return;
    spawnPacket(CX, CY, d.x, d.y, d.color);
    gsap.to(`#gr-${d.id}`, { opacity:0.85, attr:{r:52}, duration:0.32 });
    gsap.to(`#gr-${d.id}`, { opacity:0.25, attr:{r:44}, duration:1.0, delay:0.32 });
    document.getElementById('brain-lbl').textContent = 'DISPATCHING';
    addLog(d.tag, ev.cmd || d.cmd, d.color);
    d.events.push(ev);
  }

  else if (ev.type === 'agent:spawn') {
    const d = DOMAINS.find(x => x.id === ev.domain);
    if (d) {
      addLog(d.tag, `agents: ${(ev.agents||[]).join(', ')}`, d.color);
      d.events.push(ev);
    }
  }

  else if (ev.type === 'domain:complete') {
    const d = DOMAINS.find(x => x.id === ev.domain);
    if (!d) return;
    gsap.to(`#pr-${d.id}`, { strokeDashoffset:0, duration:1.8, ease:'power1.inOut' });
    gsap.to(`#cb-${d.id}`, { opacity:1, duration:0.3 });
    gsap.to(`#ct-${d.id}`, { opacity:1, duration:0.3 });
    spawnPacket(d.x, d.y, CX, CY, d.color);
    addLog(d.tag, 'complete ✓', d.color);
    d.events.push(ev);
    refreshSessions();
  }

  else if (ev.type === 'intercom') {
    const fi = DOMAINS.findIndex(x => x.id === ev.from);
    const ti = DOMAINS.findIndex(x => x.id === ev.to);
    if (fi >= 0 && ti >= 0) {
      spawnPacket(DOMAINS[fi].x, DOMAINS[fi].y, DOMAINS[ti].x, DOMAINS[ti].y, DOMAINS[fi].color, ev.msg||'');
      gsap.to(`#gr-${DOMAINS[ti].id}`, { opacity:0.6, attr:{r:50}, duration:0.28 });
      gsap.to(`#gr-${DOMAINS[ti].id}`, { opacity:0.2, attr:{r:44}, duration:0.8, delay:0.28 });
      addLog('[IC]', `${ev.from}→${ev.to}: ${ev.msg||''}`, '#7080d8');
    }
  }

  else if (ev.type === 'session:complete') {
    document.getElementById('brain-lbl').textContent = 'MASTERMIND';
    gsap.to('#brain-glow', { attr:{r:120}, opacity:0.9, duration:0.45 });
    gsap.to('#brain-glow', { attr:{r:75}, opacity:0.35, duration:1.5, delay:0.45 });
    gsap.to('#brain-ring', { attr:{stroke:'#ff88ff','stroke-width':6}, duration:0.4 });
    gsap.to('#brain-ring', { attr:{stroke:'#5c30b8','stroke-width':2.5}, duration:1.5, delay:0.4 });
    addLog('[✓]', `run complete — ${ev.domains||'?'} domains`, '#40e880');
    gsap.to('#prompt-box', { opacity:0, duration:0.5 });
    refreshSessions();
  }
}

// ── SSE event stream ───────────────────────────────────────────────────────────
let evtSource = null;
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/api/mastermind-stream');
  evtSource.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      handleLiveEvent(ev);
    } catch (_) {}
  };
  evtSource.onerror = () => {
    setTimeout(connectSSE, 4000);
  };
}

// ── Session sidebar ────────────────────────────────────────────────────────────
let currentSessionId = null;

async function refreshSessions() {
  try {
    const res = await fetch('/api/mastermind/sessions');
    const sessions = await res.json();
    renderSessions(sessions);
  } catch (_) {}
}

function renderSessions(sessions) {
  const wrap = document.getElementById('sb-sessions');
  const noSess = document.getElementById('sb-no-sessions');
  if (!sessions || !sessions.length) {
    if (noSess) noSess.style.display = 'block';
    const items = wrap.querySelectorAll('.sess-item');
    items.forEach(i => i.remove());
    return;
  }
  if (noSess) noSess.style.display = 'none';
  // Remove old items
  wrap.querySelectorAll('.sess-item').forEach(el => el.remove());
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'sess-item' + (s.status === 'running' ? ' running' : '') + (s.id === currentSessionId ? ' active' : '');
    const ts = new Date(s.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const date = new Date(s.ts).toLocaleDateString([], {month:'short',day:'numeric'});
    const elapsed = s.endTs ? ((s.endTs - s.ts)/1000).toFixed(0)+'s' : (s.status==='running'?'RUNNING…':'?');
    item.innerHTML = `
      <div class="sess-ts">${date} ${ts} · ${elapsed}</div>
      <div class="sess-prompt">${s.prompt||'(no prompt)'}</div>
      <div class="sess-badges">
        <span class="sess-badge ${s.status==='running'?'running-badge':''}">${s.status||'?'}</span>
        ${(s.domains||[]).slice(0,4).map(d=>`<span class="sess-badge">${d}</span>`).join('')}
        ${(s.domains||[]).length>4?`<span class="sess-badge">+${s.domains.length-4}</span>`:''}
        <a class="sess-trace-link" href="/api/mastermind/session/${s.id}/trace" target="_blank" title="View raw trace" onclick="event.stopPropagation()">trace↗</a>
      </div>`;
    item.addEventListener('click', () => {
      wrap.querySelectorAll('.sess-item').forEach(x=>x.classList.remove('active'));
      item.classList.add('active');
      currentSessionId = s.id;
      openSessionDetail(s);
    });
    wrap.appendChild(item);
  });
}

      <div class="dp-event">Command: <span style="color:#7080c0">${d.cmd}</span></div>
      <div class="dp-event">Events this session: <span style="color:${d.color}">${evts.length}</span></div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">RECENT EVENTS</div>

async function openSessionDetail(s) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-emoji').textContent = '📋';
  document.getElementById('dp-title').textContent = 'SESSION DETAIL';
  const body = document.getElementById('dp-body');
  body.innerHTML = '<div style="color:#303060;font-size:9px;padding:8px">Loading…</div>';
  panel.classList.add('open');
  try {
    const res = await fetch(`/api/mastermind/session/${s.id}`);
    const full = await res.json();
    if (!full) { body.innerHTML = '<div style="color:#303060;font-size:9px">Session not found.</div>'; return; }
    const ts = new Date(full.ts).toLocaleString();
    const elapsed = full.endTs ? ((full.endTs - full.ts)/1000).toFixed(1)+'s' : 'running';
    const evts = full.events || [];
    const domainSet = full.domains || [];
    body.innerHTML = `
      <div class="dp-section">
        <div class="dp-section-title">OVERVIEW</div>
        <div class="dp-event">Started: <span style="color:#6060a0">${ts}</span></div>
        <div class="dp-event">Duration: <span style="color:#6060a0">${elapsed}</span></div>
        <div class="dp-event">Status: <span style="color:${full.status==='complete'?'#40e880':full.status==='running'?'#28c068':'#f87171'}">${full.status||'?'}</span></div>
        <div class="dp-event">Domains: <span style="color:#8080c0">${domainSet.join(', ')||'—'}</span></div>
      </div>
      <div class="dp-section">
        <div class="dp-section-title">PROMPT</div>
        <div class="dp-event" style="color:#6070b0;word-break:break-all;white-space:normal;line-height:1.6">${full.prompt||'—'}</div>
      </div>
      ${domainSet.length ? `
      <div class="dp-section">
        <div class="dp-section-title">ACTIVE DOMAINS</div>
        ${domainSet.map(did => {
          const d = DOMAINS.find(x=>x.id===did);
          return d ? `<div class="dp-event"><span style="color:${d.color}">${d.emoji} ${d.label}</span></div>` : '';
        }).join('')}
      </div>` : ''}
      <div class="dp-section">
        <div class="dp-section-title">EVENT TIMELINE (${evts.length})</div>
        ${evts.map(e => {
          const et = new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
          const d = e.domain ? DOMAINS.find(x=>x.id===e.domain) : null;
          const color = d ? d.color : '#6060a0';
          let detail = '';
          if (e.type === 'session:start') detail = `<span style="color:#5050a0;font-size:8px;word-break:break-all">${e.prompt||''}</span>`;
          else if (e.type === 'domain:dispatch') detail = `<span style="color:#5060a0;font-size:8px">${e.cmd||''}</span>`;
          else if (e.type === 'agent:spawn') detail = `<span style="color:#507090;font-size:8px">agent: <b>${e.agent||''}</b> — ${(e.task||'').slice(0,50)}</span>`;
          else if (e.type === 'intercom') detail = `<span style="color:#506070;font-size:8px">${e.from||'?'} → ${e.to||'?'}: ${e.msg||''}</span>`;
          else if (e.type === 'domain:complete') {
            const arts = (e.artifacts||[]).map(a=>`<span style="color:#407050;font-size:7px">📄 ${a}</span>`).join(' ');
            detail = `<span style="color:#406050;font-size:8px">status: ${e.status||'?'}</span>${arts?' '+arts:''}`;
          }
          else if (e.type === 'session:complete') detail = `<span style="color:#405080;font-size:8px">domains: ${(e.domains||[]).join(', ')}</span>`;
          return `<div class="dp-event" style="flex-direction:column;align-items:flex-start;gap:1px"><div><span class="ev-ts">${et}</span> <span class="ev-type" style="color:${color}">${e.type}</span>${e.domain?' <span style="color:#404060;font-size:8px">['+e.domain+']</span>':''}</div>${detail?'<div style="padding-left:4px">'+detail+'</div>':''}</div>`;
        }).join('')}
      </div>
      <div class="dp-section">
        <div class="dp-section-title">EXPORT</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <a class="dp-export-btn" href="/api/mastermind/session/${full.id}/trace" target="_blank">📄 View Trace</a>
          <button class="dp-export-btn" onclick="downloadSession('${full.id}')">⬇ Download JSON</button>
        </div>
      </div>
    `;
  } catch(err) {
    body.innerHTML = `<div style="color:#a03030;font-size:9px">${err.message}</div>`;
  }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  currentSessionId = null;
  document.querySelectorAll('.sess-item').forEach(x=>x.classList.remove('active'));
}

async function downloadSession(id) {
  const res = await fetch(`/api/mastermind/session/${id}`);
  const data = await res.json();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${id}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Live data polling for status bar ──────────────────────────────────────────
async function pollStatus() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) return;
    const data = await res.json();
    const active = !!data?.swarm?.activity?.swarm?.active;
    const dot = document.getElementById('l-dot');
    dot.classList.toggle('on', active);
    document.getElementById('l-status').textContent = active ? 'LIVE' : 'IDLE';
    const n = data?.swarm?.state?.agentPlan?.length || 0;
    document.getElementById('l-agents').textContent = n + ' agent' + (n!==1?'s':'');
    // Highlight last routed domain
    const route = data?.hooks?.lastRoute || '';
    if (route && !isMovieMode) {
      const hit = DOMAINS.find(d => route.toLowerCase().includes(d.id));
      if (hit) {
        gsap.to(`#gr-${hit.id}`, { opacity:0.85, attr:{r:52}, duration:0.35 });
        gsap.to(`#gr-${hit.id}`, { opacity:0.2, attr:{r:44}, duration:1.8, delay:0.35 });
      }
    }
  } catch (_) {}
}

// ── Bootstrap ──────────────────────────────────────────────────────────────────
buildStage().then ? null : null;  // fire-and-forget
buildStage();
connectSSE();
refreshSessions();
pollStatus();
setInterval(pollStatus, 4000);
setInterval(refreshSessions, 8000);

// Set initial live mode banner
document.getElementById('mode-banner').classList.add('live-mode');
</script>
</body>
