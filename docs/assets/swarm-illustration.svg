<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <style>
      .node-label { font-family: 'Fira Code', monospace; font-size: 10px; fill: #a8bfb8; text-anchor: middle; }
      .node-queen { font-family: 'Space Grotesk', monospace; font-size: 10px; fill: #00D2AA; font-weight: 600; text-anchor: middle; }
      .topo-label { font-family: 'Space Grotesk', sans-serif; font-size: 10px; fill: #4a7a70; letter-spacing: 0.07em; text-transform: uppercase; text-anchor: middle; }
    </style>
  </defs>
  <rect width="600" height="300" fill="oklch(11% 0.012 265)" rx="12"/>

  <!-- Title -->
  <text x="300" y="22" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11px" fill="oklch(55% 0.010 265)" letter-spacing="0.05em">SWARM TOPOLOGIES — 6 PATTERNS · 5 CONSENSUS ALGORITHMS</text>

  <!-- HIERARCHICAL (left) -->
  <text x="110" y="45" class="topo-label">Hierarchical</text>
  <!-- Queen -->
  <circle cx="110" cy="75" r="14" fill="oklch(72% 0.22 168 / 0.15)" stroke="#00D2AA" stroke-width="1.5"/>
  <text x="110" y="79" class="node-queen">Q</text>
  <!-- Workers -->
  <circle cx="60" cy="125" r="9" fill="oklch(65% 0.16 295 / 0.15)" stroke="oklch(65% 0.16 295)" stroke-width="1"/>
  <circle cx="110" cy="125" r="9" fill="oklch(65% 0.16 295 / 0.15)" stroke="oklch(65% 0.16 295)" stroke-width="1"/>
  <circle cx="160" cy="125" r="9" fill="oklch(65% 0.16 295 / 0.15)" stroke="oklch(65% 0.16 295)" stroke-width="1"/>
  <!-- Edges -->
  <line x1="110" y1="89" x2="60" y2="116" stroke="#00D2AA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="110" y1="89" x2="110" y2="116" stroke="#00D2AA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="110" y1="89" x2="160" y2="116" stroke="#00D2AA" stroke-width="1" stroke-opacity="0.5"/>
  <text x="60" y="148" class="node-label">coder</text>
  <text x="110" y="148" class="node-label">tester</text>
  <text x="160" y="148" class="node-label">review</text>

  <!-- MESH (center-left) -->
  <text x="290" y="45" class="topo-label">Mesh</text>
  <!-- Nodes in pentagon -->
  <circle cx="290" cy="80" r="9" fill="oklch(70% 0.18 60 / 0.15)" stroke="oklch(70% 0.18 60)" stroke-width="1"/>
  <circle cx="260" cy="105" r="9" fill="oklch(70% 0.18 60 / 0.15)" stroke="oklch(70% 0.18 60)" stroke-width="1"/>
  <circle cx="270" cy="138" r="9" fill="oklch(70% 0.18 60 / 0.15)" stroke="oklch(70% 0.18 60)" stroke-width="1"/>
  <circle cx="310" cy="138" r="9" fill="oklch(70% 0.18 60 / 0.15)" stroke="oklch(70% 0.18 60)" stroke-width="1"/>
  <circle cx="320" cy="105" r="9" fill="oklch(70% 0.18 60 / 0.15)" stroke="oklch(70% 0.18 60)" stroke-width="1"/>
  <!-- Full mesh edges -->
  <line x1="290" y1="80" x2="260" y2="105" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="290" y1="80" x2="270" y2="138" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="290" y1="80" x2="310" y2="138" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="290" y1="80" x2="320" y2="105" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="260" y1="105" x2="270" y2="138" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="260" y1="105" x2="310" y2="138" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="260" y1="105" x2="320" y2="105" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="270" y1="138" x2="310" y2="138" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="270" y1="138" x2="320" y2="105" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="310" y1="138" x2="320" y2="105" stroke="oklch(70% 0.18 60)" stroke-width="0.7" stroke-opacity="0.4"/>

  <!-- ADAPTIVE (right) -->
  <text x="490" y="45" class="topo-label">Adaptive</text>
  <!-- Morphing topology hint -->
  <circle cx="490" cy="80" r="12" fill="oklch(62% 0.20 22 / 0.15)" stroke="oklch(62% 0.20 22)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="490" y="84" class="node-queen" fill="oklch(62% 0.20 22)">A</text>
  <circle cx="450" cy="110" r="8" fill="oklch(62% 0.20 22 / 0.10)" stroke="oklch(62% 0.20 22)" stroke-width="0.8" stroke-dasharray="2 2"/>
  <circle cx="490" cy="120" r="8" fill="oklch(62% 0.20 22 / 0.10)" stroke="oklch(62% 0.20 22)" stroke-width="0.8" stroke-dasharray="2 2"/>
  <circle cx="530" cy="110" r="8" fill="oklch(62% 0.20 22 / 0.10)" stroke="oklch(62% 0.20 22)" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="490" y1="92" x2="450" y2="102" stroke="oklch(62% 0.20 22)" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <line x1="490" y1="92" x2="490" y2="112" stroke="oklch(62% 0.20 22)" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <line x1="490" y1="92" x2="530" y2="102" stroke="oklch(62% 0.20 22)" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <text x="490" y="148" class="node-label" fill="oklch(62% 0.20 22)">evolves by task</text>

  <!-- Consensus algorithms row -->
  <line x1="32" y1="175" x2="568" y2="175" stroke="oklch(30% 0.015 265)" stroke-width="1"/>
  <text x="300" y="193" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10px" fill="oklch(45% 0.010 265)" letter-spacing="0.06em">CONSENSUS</text>

  <!-- 5 consensus pills -->
  <g transform="translate(30,204)">
    <rect width="88" height="28" rx="14" fill="oklch(72% 0.22 168 / 0.10)" stroke="#00D2AA" stroke-width="0.8"/>
    <text x="44" y="19" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11px" fill="#00D2AA">Raft</text>
  </g>
  <g transform="translate(130,204)">
    <rect width="100" height="28" rx="14" fill="oklch(65% 0.16 295 / 0.10)" stroke="oklch(65% 0.16 295)" stroke-width="0.8"/>
    <text x="50" y="19" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11px" fill="oklch(65% 0.16 295)">Byzantine</text>
  </g>
  <g transform="translate(242,204)">
    <rect width="88" height="28" rx="14" fill="oklch(70% 0.18 60 / 0.10)" stroke="oklch(70% 0.18 60)" stroke-width="0.8"/>
    <text x="44" y="19" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11px" fill="oklch(70% 0.18 60)">Gossip</text>
  </g>
  <g transform="translate(342,204)">
    <rect width="80" height="28" rx="14" fill="oklch(78% 0.14 210 / 0.10)" stroke="oklch(78% 0.14 210)" stroke-width="0.8"/>
    <text x="40" y="19" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11px" fill="oklch(78% 0.14 210)">CRDT</text>
  </g>
  <g transform="translate(434,204)">
    <rect width="88" height="28" rx="14" fill="oklch(62% 0.20 22 / 0.10)" stroke="oklch(62% 0.20 22)" stroke-width="0.8"/>
    <text x="44" y="19" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11px" fill="oklch(62% 0.20 22)">Quorum</text>
  </g>

  <!-- Agent count stat -->
  <text x="300" y="262" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="28px" font-weight="700" fill="#00D2AA">230+</text>
  <text x="300" y="282" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11px" fill="oklch(45% 0.010 265)">SPECIALIZED AGENTS</text>
</svg>
